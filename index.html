<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Route Navigator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #map { height: 400px; width: 100%; }
        form { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Truck Route Navigator</h1>
    <div id="map"></div>
    <form id="routeForm">
        <label for="start">Start Location:</label>
        <input type="text" id="start" required>
        <label for="end">Destination:</label>
        <input type="text" id="end" required>
        <label for="dimensions">Vehicle Dimensions (Width x Height):</label>
        <input type="text" id="dimensions" placeholder="e.g. 2.5m x 4.0m" required>
        <button type="submit">Calculate Route</button>
    </form>
    <section id="savedRoutes">
        <h2>Saved Routes</h2>
        <ul id="routeList"></ul>
    </section>
    <script>
        // Initialize map and route navigation functionality here

        document.getElementById('routeForm').onsubmit = function(e) {
            e.preventDefault();
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const dimensions = document.getElementById('dimensions').value;
            // Add route calculation logic here
            // Example: calculateRoute(start, end, dimensions);
            // Add route to saved routes
            const li = document.createElement('li');
            li.textContent = `Route from ${start} to ${end} (Dimensions: ${dimensions})`;
            document.getElementById('routeList').appendChild(li);
        };
    </script>
</body>
</html>
