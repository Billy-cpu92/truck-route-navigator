<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Route Navigator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Truck Route Navigator</h1>
    </header>
    <main>
        <section id="map">
            <h2>Map Interface</h2>
            <div id="map-container"></div>
        </section>
        <section id="route-input">
            <h2>Input Route</h2>
            <label for="start-location">Start Location:</label>
            <input type="text" id="start-location" name="start-location">
            <label for="end-location">End Location:</label>
            <input type="text" id="end-location" name="end-location">
            <button id="calculate-route">Calculate Route</button>
        </section>
        <section id="vehicle-dimensions">
            <h2>Vehicle Dimensions</h2>
            <label for="vehicle-length">Length (ft):</label>
            <input type="number" id="vehicle-length" name="vehicle-length">
            <label for="vehicle-width">Width (ft):</label>
            <input type="number" id="vehicle-width" name="vehicle-width">
            <label for="vehicle-height">Height (ft):</label>
            <input type="number" id="vehicle-height" name="vehicle-height">
        </section>
        <section id="saved-routes">
            <h2>Saved Routes</h2>
            <ul id="routes-list"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Truck Route Navigator</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
